version: '3.9'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: support_backend
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - HELPDESK_API_URL=${HELPDESK_API_URL}
      - HELPDESK_API_KEY=${HELPDESK_API_KEY}
    env_file:
      - .env
    networks:
      - support_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: support_frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    environment:
      - VITE_API_BASE_URL=http://backend:3001
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - support_network

networks:
  support_network:
    driver: bridge